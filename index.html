<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2027학년도 희망학교 조사서</title>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Round+Square:wght@400;700;800;900&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #4F6DF5; --primary-light: #E8EEFF; --primary-dark: #2E4BCC;
  --accent: #FF6B6B; --success: #22C55E; --success-light: #E8FFF0;
  --bg: #F7F8FF; --card: #FFFFFF; --text: #1E2340;
  --text-sub: #5A6080; --text-muted: #9AA0BE; --border: #E8ECFF;
  --radius: 16px; --radius-sm: 10px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.6; }

.header {
  background: linear-gradient(135deg, #4F6DF5 0%, #7C3AED 100%);
  color: white; padding: 36px 24px 32px; text-align: center; position: relative; overflow: hidden;
}
.header::before { content:''; position:absolute; top:-50px; right:-50px; width:200px; height:200px; background:rgba(255,255,255,.07); border-radius:50%; }
.header::after  { content:''; position:absolute; bottom:-60px; left:20px; width:160px; height:160px; background:rgba(255,255,255,.05); border-radius:50%; }
.header-badge { display:inline-block; background:rgba(255,255,255,.2); border:1px solid rgba(255,255,255,.35); border-radius:100px; padding:5px 16px; font-size:12px; font-weight:700; margin-bottom:14px; position:relative; z-index:1; }
.header h1 { font-family:'Nanum Round Square',sans-serif; font-size:clamp(22px,5vw,32px); font-weight:900; margin-bottom:8px; position:relative; z-index:1; }
.header p  { font-size:14px; opacity:.88; position:relative; z-index:1; }

.wrap { max-width:680px; margin:0 auto; padding:32px 16px 64px; }
.form-card { background:var(--card); border-radius:var(--radius); border:2px solid var(--primary); padding:28px 28px 32px; }

.section-label { font-size:12px; font-weight:700; color:var(--text-muted); letter-spacing:.6px; margin-bottom:14px; display:flex; align-items:center; gap:8px; }
.section-label::after { content:''; flex:1; height:1px; background:var(--border); }

.field-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:14px; margin-bottom:28px; }
label { display:block; font-size:13px; font-weight:700; color:var(--text-sub); margin-bottom:6px; }
.req { color:var(--accent); }

input[type="text"], select, textarea { width:100%; padding:11px 14px; border:1.5px solid var(--border); border-radius:var(--radius-sm); font-size:14px; font-family:'Noto Sans KR',sans-serif; background:var(--bg); color:var(--text); outline:none; transition:border-color .18s; }
input[type="text"]:focus, select:focus, textarea:focus { border-color:var(--primary); }
textarea { resize:vertical; }

#school-input-list { display:flex; flex-direction:column; gap:8px; margin-bottom:10px; }
.school-row { display:flex; align-items:center; gap:8px; }
.row-num { width:30px; height:30px; border-radius:50%; background:var(--primary); color:white; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:700; flex-shrink:0; }
.row-del { width:30px; height:30px; border-radius:50%; border:1.5px solid var(--border); background:white; color:var(--text-muted); font-size:17px; cursor:pointer; flex-shrink:0; display:flex; align-items:center; justify-content:center; line-height:1; transition:background .15s,border-color .15s; }
.row-del:hover { background:#FFF5F5; border-color:var(--accent); color:var(--accent); }

#add-btn { display:inline-flex; align-items:center; gap:6px; padding:9px 18px; border:1.5px dashed var(--primary); border-radius:var(--radius-sm); background:var(--primary-light); color:var(--primary-dark); font-size:13px; font-weight:700; cursor:pointer; font-family:'Noto Sans KR',sans-serif; margin-bottom:28px; transition:background .15s; }
#add-btn:hover { background:#D6DFFF; }

.btn-row { display:flex; gap:10px; flex-wrap:wrap; margin-top:4px; }
.btn { flex:1; min-width:120px; padding:13px 18px; border-radius:100px; font-size:15px; font-weight:700; cursor:pointer; border:none; font-family:'Noto Sans KR',sans-serif; display:flex; align-items:center; justify-content:center; gap:6px; transition:all .18s; }
.btn-primary { background:var(--primary); color:white; }
.btn-primary:hover { background:var(--primary-dark); transform:translateY(-1px); }
.btn-submit { background:#22C55E; color:white; }
.btn-submit:hover { background:#16A34A; transform:translateY(-1px); }
.btn-outline { background:white; color:var(--primary); border:2px solid var(--primary); }
.btn-outline:hover { background:var(--primary-light); }
.btn-reset { flex:0; background:white; color:var(--text-muted); border:1.5px solid var(--border); padding:13px 20px; }
.btn-reset:hover { background:var(--bg); }

/* 제출 완료 메시지 */
#success-msg { display:none; background:var(--success-light); border:2px solid var(--success); border-radius:var(--radius); padding:28px; text-align:center; margin-top:20px; }
#success-msg .s-icon { font-size:48px; margin-bottom:12px; }
#success-msg h3 { font-family:'Nanum Round Square',sans-serif; font-size:20px; font-weight:900; color:#15803D; margin-bottom:8px; }
#success-msg p { font-size:14px; color:#166534; }

footer { text-align:center; padding:28px 16px; color:var(--text-muted); font-size:13px; border-top:1px solid var(--border); background:var(--card); }

@media print {
  body { background:white; }
  .header,.btn-row,#add-btn,.section-label,footer,input,select,textarea,.row-del,.school-row,#success-msg { display:none !important; }
  .wrap { padding:0; max-width:100%; }
  .form-card { border:none; padding:0; }
  #preview-wrap { display:block !important; border:none; padding-top:0; }
  #preview-box { border:1px solid #ccc; background:white; }
  .preview-label { display:none; }
}
@media (max-width:500px) {
  .form-card { padding:20px 14px 24px; }
  .field-grid { grid-template-columns:1fr 1fr; }
}
</style>
</head>
<body>

<div class="header">
  <h1>2027학년도<br>고등학교 희망학교 조사서</h1>
  <p>담임선생님께 제출하는 희망학교 조사서입니다</p>
</div>

<div class="wrap">
  <div class="form-card">

    <div class="section-label">① 기본 정보</div>
    <div class="field-grid">
      <div>
        <label>학년</label>
        <input type="text" id="f-grade" value="3학년" readonly style="width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:14px;font-family:'Noto Sans KR',sans-serif;background:#F0F0F0;color:var(--text);outline:none;">
      </div>
      <div>
        <label>반 <span class="req">*</span></label>
        <select id="f-classnum">
          <option value="">선택</option>
          <option value="1반">1반</option>
          <option value="2반">2반</option>
          <option value="3반">3반</option>
          <option value="4반">4반</option>
        </select>
      </div>
      <div>
        <label>번호 <span class="req">*</span></label>
        <input type="text" id="f-num" placeholder="예) 15">
      </div>
      <div>
        <label>이름 <span class="req">*</span></label>
        <input type="text" id="f-name" placeholder="홍길동">
      </div>
    </div>

    <div class="section-label">② 희망 학교</div>
    <div id="school-input-list">
      <div class="school-row">
        <div class="row-num">1</div>
        <input type="text" class="school-input" placeholder="희망 학교명을 입력해 주세요">
        <button class="row-del" onclick="removeRow(this)" title="삭제">×</button>
      </div>
    </div>
    <button id="add-btn" onclick="addRow()">＋ 학교 추가</button>

    <div class="section-label">③ 기타 의견 <span style="font-weight:400;color:var(--text-muted);font-size:11px;">(선택)</span></div>
    <textarea id="f-memo" rows="3" placeholder="담임선생님께 전달할 내용을 자유롭게 적어주세요." style="margin-bottom:24px;"></textarea>

    <div class="btn-row">
      <button class="btn btn-submit" onclick="doSubmit()">✅ 제출하기</button>
      <button class="btn btn-reset" onclick="doReset()">↺</button>
    </div>

  </div>

  <!-- 제출 완료 -->
  <div id="success-msg">
    <div class="s-icon">🎉</div>
    <h3>제출 완료!</h3>
    <p>희망학교 조사서가 성공적으로 제출되었습니다.<br>담임선생님이 확인하실 예정이에요.</p>
    <button class="btn btn-outline" onclick="doNewForm()" style="margin-top:18px;max-width:200px;">새로 작성하기</button>
  </div>
</div>

<footer>
  경상남도교육청 · 2027학년도 고등학교 입학전형 기본계획 기반<br>
  <span style="margin-top:4px;display:inline-block;">문의: 진로교육과 ☎ 268-1388</span>
</footer>

<script>
const COLORS = ['#4F6DF5','#4F6DF5','#4F6DF5','#8B5CF6','#8B5CF6','#8B5CF6','#14B8A6','#14B8A6','#14B8A6'];
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyj4_DTiiVKlLA42AU5-9MnrHg79res9w0LE2QlvwOP4PhHoN4UZphCeh4sCM_23O-m/exec';
function getColor(i){ return COLORS[Math.min(i, COLORS.length-1)]; }

function addRow(){
  const list = document.getElementById('school-input-list');
  const n = list.querySelectorAll('.school-row').length + 1;
  const row = document.createElement('div');
  row.className = 'school-row';
  row.innerHTML = `
    <div class="row-num" style="background:${getColor(n-1)};">${n}</div>
    <input type="text" class="school-input" placeholder="희망 학교명을 입력해 주세요">
    <button class="row-del" onclick="removeRow(this)" title="삭제">×</button>`;
  list.appendChild(row);
}

function removeRow(btn){
  const rows = document.querySelectorAll('#school-input-list .school-row');
  if(rows.length <= 1){ rows[0].querySelector('input').value=''; return; }
  btn.closest('.school-row').remove();
  renumber();
}

function renumber(){
  document.querySelectorAll('#school-input-list .school-row').forEach((row,i)=>{
    const num = row.querySelector('.row-num');
    if(num){ num.textContent=i+1; num.style.background=getColor(i); }
  });
}

function collectData(){
  const grade    = document.getElementById('f-grade').value;
  const classnum = document.getElementById('f-classnum').value.trim();
  const num      = document.getElementById('f-num').value.trim();
  const name     = document.getElementById('f-name').value.trim();
  const memo     = document.getElementById('f-memo').value.trim();
  const schools  = Array.from(document.querySelectorAll('.school-input')).map(el=>el.value.trim()).filter(Boolean);
  return { grade, classnum, num, name, memo, schools };
}

function doSubmit(){
  const d = collectData();
  if(!d.classnum){ alert('반을 입력해주세요.'); document.getElementById('f-classnum').focus(); return; }
  if(!d.num){ alert('번호를 입력해주세요.'); document.getElementById('f-num').focus(); return; }
  if(!d.name){ alert('이름을 입력해주세요.'); document.getElementById('f-name').focus(); return; }
  if(d.schools.length === 0){ alert('희망 학교를 1개 이상 입력해주세요.'); return; }

  // 버튼 로딩 상태
  const submitBtn = document.querySelector('.btn-submit');
  submitBtn.textContent = '⏳ 제출 중...';
  submitBtn.disabled = true;

  const record = { ...d, submittedAt: new Date().toISOString() };

  fetch(SCRIPT_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(record)
  })
  .then(() => {
    document.querySelector('.form-card').style.display = 'none';
    document.getElementById('success-msg').style.display = 'block';
    window.scrollTo({ top: 0, behavior: 'smooth' });
  })
  .catch(() => {
    alert('제출 중 오류가 발생했습니다. 인터넷 연결을 확인하고 다시 시도해주세요.');
    submitBtn.textContent = '✅ 제출하기';
    submitBtn.disabled = false;
  });
}

function doPrint(){
  const d = collectData();
  if(!d.name){ alert('이름을 입력해주세요.'); return; }  const schoolRows = d.schools.length
    ? d.schools.map((s,i)=>`<div style="display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid #E8ECFF;"><div style="width:24px;height:24px;border-radius:50%;background:${getColor(i)};color:white;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;">${i+1}</div><span style="font-size:14px;font-weight:500;">${s}</span></div>`).join('')
    : '<p style="color:#9AA0BE;font-size:14px;padding:8px 0;">입력된 희망 학교 없음</p>';
  const win = window.open('','_blank');
  win.document.write(`<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><title>희망학교 조사서</title>
  <link href="https://fonts.googleapis.com/css2?family=Nanum+Round+Square:wght@900&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
  <style>body{font-family:'Noto Sans KR',sans-serif;padding:32px;color:#1E2340;max-width:600px;margin:0 auto;}h2{font-family:'Nanum Round Square',sans-serif;font-size:18px;text-align:center;margin-bottom:20px;padding-bottom:12px;border-bottom:2px solid #4F6DF5;}.info{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px;padding-bottom:14px;border-bottom:1px solid #E8ECFF;}.info div span:first-child{font-size:11px;color:#9AA0BE;display:block;margin-bottom:3px;}.info div span:last-child{font-weight:700;font-size:14px;}.section-t{font-size:12px;color:#9AA0BE;font-weight:700;margin-bottom:10px;}.memo{margin-top:16px;padding-top:14px;border-top:1px solid #E8ECFF;}.date{margin-top:16px;font-size:12px;color:#9AA0BE;text-align:right;}</style>
  </head><body>
  <h2>2027학년도 고등학교 희망학교 조사서</h2>
  <div class="info">
    <div><span>학년</span><span>${d.grade||'—'}</span></div>
    <div><span>반</span><span>${d.classnum||'—'}</span></div>
    <div><span>번호</span><span>${d.num||'—'}</span></div>
    <div><span>이름</span><span>${d.name}</span></div>
  </div>
  <div class="section-t">희망 학교</div>
  ${schoolRows}
  ${d.memo?`<div class="memo"><div style="font-size:12px;color:#9AA0BE;margin-bottom:5px;">기타 의견</div><div style="font-size:14px;line-height:1.7;">${d.memo}</div></div>`:''}
  <div class="date">작성일: ${new Date().toLocaleDateString('ko-KR')}</div>
  </body></html>`);
  win.document.close();
  win.onload = () => { win.print(); };
}

function doReset(){
  if(!confirm('작성 내용을 모두 초기화할까요?')) return;
  document.getElementById('f-grade').value='';
  document.getElementById('f-classnum').value='';
  document.getElementById('f-num').value='';
  document.getElementById('f-name').value='';
  document.getElementById('f-memo').value='';
  document.getElementById('school-input-list').innerHTML=`
    <div class="school-row">
      <div class="row-num">1</div>
      <input type="text" class="school-input" placeholder="희망 학교명을 입력해 주세요">
      <button class="row-del" onclick="removeRow(this)" title="삭제">×</button>
    </div>`;
}

function doNewForm(){
  document.querySelector('.form-card').style.display='block';
  document.getElementById('success-msg').style.display='none';
  doReset();
}
</script>
</body>
</html>
